<h2>Students</h2>
<div class="search-container">
  <input 
    type="text" 
    placeholder="Search students by name..." 
    [(ngModel)]="searchText"
    class="search-input"
  >
</div>

<div *ngIf="isLoading" class="loading">Loading students...</div>
<div *ngIf="error" class="error">{{ error }}</div>

<div *ngIf="!isLoading && students.length > 0" class="students-list">
  <table class="students-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Department</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let s of students | filterBy:searchText:'name'" [appHighlight]="'#e3f2fd'">
        <td>{{ s.id }}</td>
        <td>{{ s.name }}</td>
        <td>{{ s.email }}</td>
        <td>{{ s.department || 'N/A' }}</td>
      </tr>
    </tbody>
  </table>
</div>

<div *ngIf="!isLoading && students.length === 0" class="no-data">
  No students found.
</div>
