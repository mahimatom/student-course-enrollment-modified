<div class="reactive-enroll-container">
  <h2>Enroll Student in Course (Reactive Form)</h2>

  <div *ngIf="successMessage" class="success-message">
    ✓ {{ successMessage }}
  </div>

  <form [formGroup]="enrollmentForm" (ngSubmit)="onSubmit()" class="enrollment-form">
    <div class="form-group">
      <label for="studentId">Select Student:</label>
      <select 
        id="studentId"
        formControlName="studentId" 
        class="form-control"
      >
        <option value="">Choose a student...</option>
        <option *ngFor="let student of students$ | async" [value]="student.id">
          {{ student.name }} ({{ student.email }})
        </option>
      </select>
      <div *ngIf="submitted && enrollmentForm.get('studentId')?.hasError('required')" class="error-message">
        Student selection is required
      </div>
    </div>

    <div class="form-group">
      <label for="courseId">Select Course:</label>
      <select 
        id="courseId"
        formControlName="courseId" 
        class="form-control"
      >
        <option value="">Choose a course...</option>
        <option *ngFor="let course of courses$ | async" [value]="course.id">
          {{ course.title }} ({{ course.seats }} seats available)
        </option>
      </select>
      <div *ngIf="submitted && enrollmentForm.get('courseId')?.hasError('required')" class="error-message">
        Course selection is required
      </div>
    </div>

    <div class="form-group">
      <label for="enrollmentDate">Enrollment Date:</label>
      <input 
        id="enrollmentDate"
        type="date" 
        formControlName="enrollmentDate" 
        class="form-control"
      />
      <div *ngIf="submitted && enrollmentForm.get('enrollmentDate')?.hasError('required')" class="error-message">
        Enrollment date is required
      </div>
    </div>

    <button type="submit" class="submit-btn" [disabled]="enrollmentForm.invalid">
      Enroll Student
    </button>
  </form>

  <div class="form-info">
    <p><strong>Form Status:</strong> {{ enrollmentForm.valid ? '✓ Ready to submit' : '✗ Please complete all fields' }}</p>
  </div>
</div>
